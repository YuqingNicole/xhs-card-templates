<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background: #fdf0ee;
    font-family: 'Noto Sans SC', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .blob1 {
    position: absolute;
    width: 750px; height: 750px;
    background: radial-gradient(circle, rgba(240,185,185,0.5) 0%, transparent 65%);
    top: -100px; right: -120px;
    border-radius: 50%; filter: blur(70px);
  }
  .blob2 {
    position: absolute;
    width: 550px; height: 550px;
    background: radial-gradient(circle, rgba(245,200,195,0.45) 0%, transparent 70%);
    bottom: 0; left: -80px;
    border-radius: 50%; filter: blur(80px);
  }
  .blob3 {
    position: absolute;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(255,220,210,0.6) 0%, transparent 70%);
    top: 450px; left: 300px;
    border-radius: 50%; filter: blur(50px);
  }
  /* 装饰小圆 */
  .deco-circle {
    position: absolute;
    width: 180px; height: 180px;
    border: 1px solid rgba(210,140,140,0.2);
    border-radius: 50%;
    top: 88px; right: 88px;
  }
  .deco-circle2 {
    position: absolute;
    width: 80px; height: 80px;
    border: 1px solid rgba(210,140,140,0.15);
    border-radius: 50%;
    bottom: 200px; right: 140px;
  }
  .container {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    padding: 90px 88px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top-tag {
    display: inline-flex; align-items: center; gap: 12px;
    font-size: 20px; font-weight: 300;
    color: rgba(180,100,100,0.65);
    letter-spacing: 0.2em;
  }
  .top-tag::before {
    content: ''; width: 28px; height: 1px;
    background: rgba(200,120,120,0.4);
  }
  .center {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 60px 0;
  }
  .main-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 84px; font-weight: 600;
    color: #5c2828;
    line-height: 1.2; margin-bottom: 36px;
  }
  .divider {
    width: 50px; height: 2px;
    background: linear-gradient(90deg, rgba(210,140,130,0.7), transparent);
    margin-bottom: 36px;
  }
  .subtitle {
    font-size: 28px; font-weight: 300;
    color: rgba(130,70,70,0.55);
    line-height: 1.8; letter-spacing: 0.04em;
    max-width: 660px;
  }
  .tag-row {
    display: flex; gap: 16px; margin-top: 48px;
  }
  .tag {
    padding: 8px 22px;
    border: 1px solid rgba(210,140,140,0.35);
    border-radius: 100px;
    font-size: 21px; font-weight: 300;
    color: rgba(180,100,100,0.6);
    letter-spacing: 0.05em;
  }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .author {
    font-size: 20px; font-weight: 300;
    color: rgba(180,110,110,0.45); letter-spacing: 0.12em;
  }
  .page-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 50px; font-weight: 300;
    color: rgba(220,160,150,0.2);
  }
</style>
</head>
<body>
  <div class="blob1"></div><div class="blob2"></div><div class="blob3"></div>
  <div class="deco-circle"></div><div class="deco-circle2"></div>
  <div class="container">
    <div class="top-tag">效率干货</div>
    <div class="center">
      <div class="main-title">用了 AI 之后<br>我再也不熬夜了</div>
      <div class="divider"></div>
      <div class="subtitle">5 个真实改变我工作方式的工具<br>不是广告，是亲测有效</div>
      <div class="tag-row">
        <div class="tag">AI 工具</div>
        <div class="tag">效率提升</div>
        <div class="tag">干货分享</div>
      </div>
    </div>
    <div class="bottom">
      <div class="author">@Nicole</div>
      <div class="page-num">01</div>
    </div>
  </div>
</body>
</html>
