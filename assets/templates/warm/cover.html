<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1440px;
    background: #f5ede4;
    font-family: 'Noto Serif SC', 'Noto Sans SC', serif;
    overflow: hidden;
    position: relative;
  }

  /* 柔焦背景圆 */
  .blob1 {
    position: absolute;
    width: 700px; height: 700px;
    background: radial-gradient(circle, rgba(230,185,150,0.55) 0%, transparent 70%);
    top: -100px; right: -150px;
    border-radius: 50%;
    filter: blur(60px);
  }
  .blob2 {
    position: absolute;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(210,160,120,0.35) 0%, transparent 70%);
    bottom: 50px; left: -100px;
    border-radius: 50%;
    filter: blur(80px);
  }
  .blob3 {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(245,225,200,0.6) 0%, transparent 70%);
    top: 400px; left: 200px;
    border-radius: 50%;
    filter: blur(50px);
  }

  /* 主内容区 */
  .container {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 90px 88px;
  }

  /* 顶部标签 */
  .top-tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: rgba(120, 80, 50, 0.7);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .top-tag::before {
    content: '';
    display: block;
    width: 28px;
    height: 1px;
    background: rgba(120, 80, 50, 0.4);
  }

  /* 中心标题区 */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 0;
  }

  .main-title {
    font-size: 88px;
    font-weight: 600;
    color: #3d2314;
    line-height: 1.15;
    letter-spacing: -0.01em;
    margin-bottom: 36px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, #c4855a, transparent);
    margin-bottom: 36px;
  }

  .subtitle {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 30px;
    font-weight: 300;
    color: rgba(80, 45, 20, 0.65);
    line-height: 1.7;
    letter-spacing: 0.04em;
    max-width: 680px;
  }

  /* 底部 */
  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .author {
    font-family: 'Noto Sans SC', sans-serif;
    font-size: 22px;
    font-weight: 300;
    color: rgba(120, 80, 50, 0.55);
    letter-spacing: 0.1em;
  }

  .page-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 48px;
    font-weight: 300;
    color: rgba(180, 120, 80, 0.25);
    letter-spacing: -0.02em;
  }
</style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>
  <div class="blob3"></div>

  <div class="container">
    <div class="top-tag">干货分享</div>

    <div class="center">
      <div class="main-title">标题放<br>这里</div>
      <div class="divider"></div>
      <div class="subtitle">副标题 · 一句话说清楚这篇讲什么</div>
    </div>

    <div class="bottom">
      <div class="author">@你的账号</div>
      <div class="page-num">01</div>
    </div>
  </div>
</body>
</html>
