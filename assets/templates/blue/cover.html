<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&family=Noto+Sans+SC:wght@300;400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1440px;
    background: #e8edf0;
    font-family: 'Noto Sans SC', sans-serif;
    overflow: hidden;
    position: relative;
  }
  .blob1 {
    position: absolute;
    width: 800px; height: 800px;
    background: radial-gradient(circle, rgba(180,200,215,0.5) 0%, transparent 65%);
    top: -150px; left: -150px;
    border-radius: 50%; filter: blur(80px);
  }
  .blob2 {
    position: absolute;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(160,180,200,0.4) 0%, transparent 65%);
    bottom: -50px; right: -100px;
    border-radius: 50%; filter: blur(70px);
  }
  .blob3 {
    position: absolute;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(200,210,220,0.6) 0%, transparent 70%);
    top: 500px; right: 200px;
    border-radius: 50%; filter: blur(50px);
  }
  .container {
    position: relative; z-index: 10;
    width: 100%; height: 100%;
    padding: 90px 88px;
    display: flex; flex-direction: column; justify-content: space-between;
  }
  .top-tag {
    display: inline-flex; align-items: center; gap: 14px;
    font-size: 19px; font-weight: 300;
    color: rgba(70,90,110,0.6);
    letter-spacing: 0.25em;
  }
  .top-tag::before {
    content: ''; width: 30px; height: 1px;
    background: rgba(70,90,110,0.35);
  }
  .center {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 60px 0;
  }
  .label-small {
    font-size: 22px; font-weight: 300;
    color: rgba(100,130,155,0.7);
    letter-spacing: 0.1em; margin-bottom: 28px;
  }
  .main-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 82px; font-weight: 600;
    color: #2c3e4a;
    line-height: 1.2; margin-bottom: 40px;
  }
  .divider {
    width: 50px; height: 1px;
    background: linear-gradient(90deg, rgba(100,140,170,0.5), transparent);
    margin-bottom: 36px;
  }
  .subtitle {
    font-size: 27px; font-weight: 300;
    color: rgba(60,80,100,0.55);
    line-height: 1.8; letter-spacing: 0.04em;
    max-width: 660px;
  }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
  .author {
    font-size: 20px; font-weight: 300;
    color: rgba(100,130,155,0.45); letter-spacing: 0.12em;
  }
  .page-num {
    font-family: 'Noto Serif SC', serif;
    font-size: 50px; font-weight: 300;
    color: rgba(120,160,190,0.2);
  }
</style>
</head>
<body>
  <div class="blob1"></div><div class="blob2"></div><div class="blob3"></div>
  <div class="container">
    <div class="top-tag">效率干货</div>
    <div class="center">
      <div class="label-small">工具推荐 · 亲测有效</div>
      <div class="main-title">用了 AI 之后<br>我再也不熬夜了</div>
      <div class="divider"></div>
      <div class="subtitle">5 个真实改变我工作方式的工具<br>不是广告，是真实感受</div>
    </div>
    <div class="bottom">
      <div class="author">@Nicole</div>
      <div class="page-num">01</div>
    </div>
  </div>
</body>
</html>
