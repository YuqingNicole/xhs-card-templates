<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 720px; height: 720px;
    background: #0a0a0a;
    font-family: -apple-system, 'PingFang SC', sans-serif;
    color: #fff; display: flex; flex-direction: column;
    justify-content: center; padding: 72px; position: relative; overflow: hidden;
  }
  .bg-circle {
    position: absolute; width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(124,107,246,0.2) 0%, transparent 70%);
    top: -100px; right: -100px;
  }
  .quote-mark { font-size: 80px; color: #7c6bf6; line-height: 1; margin-bottom: 16px; opacity: 0.6; }
  .quote { font-size: 28px; font-weight: 700; line-height: 1.5; margin-bottom: 40px; }
  .attr { font-size: 14px; color: rgba(255,255,255,0.4); }
  .attr span { color: rgba(255,255,255,0.7); }
  .footer {
    position: absolute; bottom: 40px; left: 72px; right: 72px;
    display: flex; justify-content: space-between;
    font-size: 12px; color: rgba(255,255,255,0.3);
  }
</style>
</head>
<body>
  <div class="bg-circle"></div>
  <div class="quote-mark">"</div>
  <div class="quote">{{QUOTE}}</div>
  <div class="attr">— <span>{{SPEAKER}}</span>，{{SOURCE}}</div>
  <div class="footer">
    <span>Nicole's Garden</span>
    <span>nicolewithlove.substack.com</span>
  </div>
</body>
</html>
